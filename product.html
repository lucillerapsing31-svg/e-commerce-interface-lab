<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Listing | ShopEase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="landing.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="products.html?category=clothing">Clothing</a></li>
                <li><a href="products.html?category=electronics">Electronics</a></li>
                <li><a href="products.html?category=books">Books</a></li>
                <li><a href="products.html?category=sale">Sale</a></li>
                <li><a href="cart.html">Cart</a> <span id="cart-count"></span></li>
                <li><a href="account.html">Account</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="products-page">
        <aside class="filter-sidebar">
            <h2>Filter</h2>
            <form id="filter-form">
                <h3>Category</h3>
                <label><input type="checkbox" name="category" value="clothing"> Clothing</label><br>
                <label><input type="checkbox" name="category" value="electronics"> Electronics</label><br>
                <label><input type="checkbox" name="category" value="books"> Books</label><br>
                <label><input type="checkbox" name="category" value="accessories"> Accessories</label><br>
                <label><input type="checkbox" name="category" value="kitchen"> Kitchen</label><br>
                
                <h3>Price Range</h3>
                <label><input type="radio" name="price" value="all" checked> All</label><br>
                <label><input type="radio" name="price" value="under30"> Under $30</label><br>
                <label><input type="radio" name="price" value="30-60"> $30 - $60</label><br>
                <label><input type="radio" name="price" value="over60"> Over $60</label><br>
                
                <button type="button" id="apply-filters">Apply Filters</button>
                <button type="button" id="reset-filters" style="margin-top: 10px; background-color: #95a5a6;">Reset Filters</button>
            </form>
        </aside>
        
        <div>
            <h1 id="page-title">All Products</h1>
            <div class="product-grid"></div>
        </div>
    </main>
    
    <hr>
    <footer>
        <p><a href="landing.html">Home</a> | <a href="account.html">My Account</a> | <a href="cart.html">Cart</a> | <a href="signup.html">Sign Up</a></p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
